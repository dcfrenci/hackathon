server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Fix for port dropping on redirects (e.g. adding trailing slashes)
    absolute_redirect off;
    port_in_redirect off;

    # Enable compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Try finding the file, then a directory index, then add .html, finally fallback to index.html
        try_files $uri $uri/ $uri.html /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
    }

    # Specifically handle STL files and assets
    location /renders/ {
        alias /usr/share/nginx/html/renders/;
        add_header Access-Control-Allow-Origin "*";
        expires 30d;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
